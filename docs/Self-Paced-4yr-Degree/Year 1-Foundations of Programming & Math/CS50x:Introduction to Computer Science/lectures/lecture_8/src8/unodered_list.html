<!DOCTYPE html>

<!--Demonstrates Unordered Lists-->
<html lang="en">
    <head>
        <title>Unordered Lists</title>
    </head>

    <body>
        <h3>What I'm stressed about</h3>
        <ul>
            <li>Not finding me a <strong>job</strong></li>
            <li>Becoming a <i>script kiddie</i>, I don't want to copy paste code all my life, I want to know how it's done.</li>
            <li>Wasting time on non-productive things.</li>
        </ul>
    </body>
</html>

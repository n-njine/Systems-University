<!DOCTYPE html>

<!--Demonstrates Paragraphs-->
<html lang="en">
    <head>
        <title>Paragraphs</title>
    </head>
    <body>
        <h1>First Heading</h1>
        <p>
            This the first line.
        </p>

        <h2>Second Heading</h2>
        <p>
            This is the Second line.
        </p>

        <h3>This is the third heading</h3>
        <p>
            This is the Third line.
        </p>

    </body>
</html>

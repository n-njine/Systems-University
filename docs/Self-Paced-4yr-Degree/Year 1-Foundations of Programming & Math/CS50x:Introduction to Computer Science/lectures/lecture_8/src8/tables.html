<!DOCTYPE html>

<!--Demo of tables, created by placing rows on top of another-->
<html lang="en">
    <head>
        <title>Tables</title>
    </head>
    <body>
        <h2>Cell Phone Buttons</h2>

        <table>
            <tr>
                <td>1</td>
                <td>2</td>
                <td>3</td>
            </tr>
            <tr>
                <td>4</td>
                <td>5</td>
                <td>6</td>
            </tr>
            <tr>
                <td>*</td>
                <td>0</td>
                <td>#</td>
            </tr>
        </table>
    </body>
</html>
